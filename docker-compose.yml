services:
  postgres:
    image: postgres:16
    container_name: finagentops_postgres
    restart: always
    environment:
      POSTGRES_DB: finagentops
      POSTGRES_USER: finagentops_user
      POSTGRES_PASSWORD: finagentops_password
    ports:
      - "5432:5432"
    volumes:
      - finagentops_postgres_data:/var/lib/postgresql/data

volumes:
  finagentops_postgres_data: